<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전자결재 시스템</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;background:#f0f2f5;color:#333;font-size:14px;}
a{text-decoration:none;color:inherit;cursor:pointer;}
input,select,textarea,button{font-family:inherit;}
.app{display:flex;height:100vh;}

/* Icon sidebar */
.icon-sidebar{width:50px;background:#2c3e50;display:flex;flex-direction:column;align-items:center;padding-top:12px;gap:4px;flex-shrink:0;}
.icon-sidebar .ib{width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:#8899aa;border-radius:8px;cursor:pointer;font-size:18px;transition:.2s;position:relative;}
.icon-sidebar .ib:hover,.icon-sidebar .ib.active{background:#3d5166;color:#fff;}
.icon-sidebar .ib .badge{position:absolute;top:2px;right:2px;background:#e74c3c;color:#fff;font-size:9px;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;}

/* Left panel */
.left-panel{width:240px;background:#fff;border-right:1px solid #ddd;overflow-y:auto;flex-shrink:0;}
.left-panel h3{padding:16px 20px 8px;font-size:15px;}
.new-doc-btn{display:block;margin:12px 16px;padding:12px;background:#2196F3;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;text-align:center;transition:.2s;}
.new-doc-btn:hover{background:#1976D2;}
.nav-section{margin-top:8px;}
.nav-section-title{padding:8px 20px 4px;font-size:12px;color:#888;font-weight:600;}
.nav-item{padding:8px 20px 8px 28px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:13px;transition:.15s;}
.nav-item:hover{background:#f5f5f5;}
.nav-item.active{background:#e3f2fd;color:#1976D2;font-weight:600;}
.nav-item .cnt{margin-left:auto;background:#e0e0e0;color:#666;font-size:11px;padding:1px 7px;border-radius:10px;}
.nav-item .cnt.alert{background:#e74c3c;color:#fff;}

/* Main */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.top-bar{height:56px;background:#fff;border-bottom:1px solid #ddd;display:flex;align-items:center;padding:0 24px;gap:16px;}
.top-bar h2{font-size:16px;}
.top-bar .bc{color:#888;font-size:13px;}
.top-bar .sp{flex:1;}
.user-info{display:flex;align-items:center;gap:8px;font-size:13px;}
.user-avatar{width:32px;height:32px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;}
.content{flex:1;overflow-y:auto;padding:24px;}

/* Tables */
.doc-table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.doc-table th{background:#f8f9fa;padding:12px 16px;text-align:left;font-size:13px;color:#666;border-bottom:2px solid #e0e0e0;white-space:nowrap;}
.doc-table td{padding:12px 16px;border-bottom:1px solid #f0f0f0;font-size:13px;}
.doc-table tr:hover td{background:#f8fbff;}
.doc-title-link{color:#1976D2;cursor:pointer;font-weight:500;}
.doc-title-link:hover{text-decoration:underline;}

.status-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;}
.status-badge.draft{background:#fff3e0;color:#e65100;}
.status-badge.pending{background:#e3f2fd;color:#1565c0;}
.status-badge.approved{background:#e8f5e9;color:#2e7d32;}
.status-badge.rejected{background:#ffebee;color:#c62828;}

/* Doc view */
.doc-container{max-width:1200px;margin:0 auto;display:flex;gap:20px;}
.doc-main{flex:1;background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden;}
.doc-sidebar{width:280px;flex-shrink:0;}
.doc-toolbar{display:flex;align-items:center;gap:8px;padding:12px 20px;border-bottom:1px solid #e0e0e0;background:#f8f9fa;flex-wrap:wrap;}
.btn{padding:7px 16px;border:1px solid #ddd;background:#fff;border-radius:6px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:.15s;}
.btn:hover{background:#f0f0f0;}
.btn.primary{background:#2196F3;color:#fff;border-color:#2196F3;}
.btn.primary:hover{background:#1976D2;}
.btn.danger{color:#c62828;border-color:#ef9a9a;}
.btn.danger:hover{background:#ffebee;}
.btn.success{background:#4caf50;color:#fff;border-color:#4caf50;}
.btn.success:hover{background:#388e3c;}

.doc-paper{padding:40px 48px;min-height:600px;}
.doc-paper h1{text-align:center;font-size:28px;letter-spacing:12px;margin-bottom:32px;}

.doc-meta-table{border-collapse:collapse;margin-bottom:24px;}
.doc-meta-table th,.doc-meta-table td{border:1px solid #999;padding:8px 16px;font-size:13px;}
.doc-meta-table th{background:#f5f5f5;font-weight:600;width:80px;text-align:center;}

.approval-table{border-collapse:collapse;}
.approval-table th,.approval-table td{border:1px solid #999;padding:4px 8px;text-align:center;font-size:12px;}
.approval-table th{background:#f5f5f5;font-weight:600;}
.stamp-cell{width:80px;height:70px;vertical-align:middle;}
.stamp{display:inline-flex;flex-direction:column;align-items:center;}
.stamp-circle{width:48px;height:48px;border:2px solid #c0392b;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#c0392b;font-size:13px;font-weight:700;}
.stamp-circle.rejected{border-color:#666;color:#666;}
.stamp-name{font-size:11px;color:#333;margin-top:2px;}
.stamp-date{font-size:10px;color:#888;}
.stamp-pending{color:#999;font-size:12px;}

.doc-detail-table{width:100%;border-collapse:collapse;margin-bottom:20px;clear:both;}
.doc-detail-table th,.doc-detail-table td{border:1px solid #999;padding:8px 16px;font-size:13px;}
.doc-detail-table th{background:#f5f5f5;font-weight:600;width:100px;text-align:center;}
.doc-body{margin-top:16px;padding:20px 0;min-height:200px;white-space:pre-wrap;line-height:1.8;font-size:14px;}
.doc-body-label{text-align:center;color:#888;margin-top:16px;font-size:13px;}

/* Sidebar cards */
.sidebar-card{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:16px;overflow:hidden;}
.sidebar-card-header{padding:12px 16px;border-bottom:1px solid #e0e0e0;}
.sidebar-card-header h4{font-size:14px;}
.approval-line-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #f0f0f0;}
.approval-line-item:last-child{border-bottom:none;}
.approval-line-item.current{background:#fff8e1;}
.approval-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:#fff;flex-shrink:0;}
.approval-line-info{flex:1;}
.approval-line-info .name{font-size:13px;font-weight:600;}
.approval-line-info .dept{font-size:11px;color:#888;}
.approval-line-info .time{font-size:11px;color:#aaa;}
.als{font-size:11px;font-weight:600;padding:3px 8px;border-radius:10px;}
.als.done{background:#e8f5e9;color:#2e7d32;}
.als.waiting{background:#fff3e0;color:#e65100;}
.als.rejected{background:#ffebee;color:#c62828;}

/* Forms */
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:#555;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;}
.form-group textarea{min-height:200px;resize:vertical;line-height:1.8;}
.form-row{display:flex;gap:16px;}
.form-row .form-group{flex:1;}

.approver-slot{display:flex;align-items:center;gap:8px;padding:8px;background:#f8f9fa;border-radius:6px;margin-bottom:8px;}
.approver-slot select{flex:1;padding:6px 8px;border:1px solid #ddd;border-radius:4px;font-size:13px;}
.approver-slot .sl{font-size:12px;color:#888;width:60px;flex-shrink:0;}
.rm-btn{background:none;border:none;color:#999;cursor:pointer;font-size:16px;padding:0 4px;}
.rm-btn:hover{color:#c62828;}
.add-btn{padding:6px 12px;border:1px dashed #bbb;background:transparent;border-radius:6px;font-size:12px;color:#888;cursor:pointer;width:100%;margin-top:4px;}
.add-btn:hover{border-color:#2196F3;color:#2196F3;}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000;}
.modal{background:#fff;border-radius:12px;padding:24px;width:480px;max-width:90%;max-height:90vh;overflow-y:auto;}
.modal h3{margin-bottom:16px;font-size:18px;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;}

/* Login & Register */
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a237e,#0d47a1,#01579b);}
.login-box{background:#fff;border-radius:16px;padding:48px 40px;width:420px;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.login-box h2{text-align:center;margin-bottom:8px;font-size:22px;}
.login-box .subtitle{text-align:center;color:#888;font-size:13px;margin-bottom:32px;}
.user-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px;}
.user-card{padding:10px;border:2px solid #e0e0e0;border-radius:8px;cursor:pointer;text-align:center;transition:.15s;}
.user-card:hover{border-color:#1976D2;background:#e3f2fd;}
.user-card .cn{font-size:14px;font-weight:600;}
.user-card .cr{font-size:11px;color:#888;}
.login-divider{text-align:center;margin:20px 0;color:#aaa;font-size:12px;position:relative;}
.login-divider::before,.login-divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:#ddd;}
.login-divider::before{left:0;}
.login-divider::after{right:0;}

/* Settings */
.settings-page{max-width:800px;margin:0 auto;}
.settings-section{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:24px;margin-bottom:20px;}
.settings-section h3{font-size:16px;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #eee;}
.setting-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f5f5f5;}
.setting-row:last-child{border-bottom:none;}
.setting-row label{width:120px;font-size:13px;font-weight:600;flex-shrink:0;}
.setting-row input,.setting-row select{flex:1;padding:6px 10px;border:1px solid #ddd;border-radius:4px;font-size:13px;}
.user-list-item{display:flex;align-items:center;gap:12px;padding:10px;background:#f8f9fa;border-radius:6px;margin-bottom:8px;}
.user-list-item .uinfo{flex:1;}
.user-list-item .uname{font-weight:600;font-size:13px;}
.user-list-item .urole{font-size:11px;color:#888;}

/* Calendar */
.calendar-wrap{max-width:1000px;margin:0 auto;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.cal-header h3{font-size:18px;}
.cal-nav{display:flex;align-items:center;gap:12px;}
.cal-nav button{padding:6px 12px;border:1px solid #ddd;background:#fff;border-radius:6px;cursor:pointer;font-size:14px;}
.cal-nav button:hover{background:#f0f0f0;}
.cal-nav span{font-size:16px;font-weight:600;min-width:160px;text-align:center;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden;}
.cal-day-header{padding:10px;text-align:center;font-size:12px;font-weight:600;color:#666;background:#f8f9fa;border-bottom:1px solid #e0e0e0;}
.cal-day-header:first-child{color:#e74c3c;}
.cal-day-header:last-child{color:#1976D2;}
.cal-cell{min-height:100px;padding:6px;border:1px solid #f0f0f0;cursor:pointer;transition:.1s;vertical-align:top;}
.cal-cell:hover{background:#f8fbff;}
.cal-cell.other-month{background:#fafafa;}
.cal-cell.other-month .day-num{color:#ccc;}
.cal-cell.today{background:#e3f2fd;}
.cal-cell .day-num{font-size:12px;font-weight:600;margin-bottom:4px;}
.cal-cell:nth-child(7n+1) .day-num{color:#e74c3c;}
.cal-cell:nth-child(7n) .day-num{color:#1976D2;}
.cal-event{font-size:10px;padding:2px 4px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.cal-event.vacation{background:#fff3e0;color:#e65100;border-left:3px solid #ff9800;}
.cal-event.event{background:#e3f2fd;color:#1565c0;border-left:3px solid #2196F3;}
.cal-event.holiday{background:#ffebee;color:#c62828;border-left:3px solid #e74c3c;}

/* Tabs */
.tab-bar{display:flex;border-bottom:2px solid #e0e0e0;margin-bottom:16px;}
.tab-btn{padding:10px 20px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:#888;transition:.15s;}
.tab-btn:hover{color:#333;}
.tab-btn.active{color:#1976D2;border-bottom-color:#1976D2;font-weight:600;}

.empty-state{text-align:center;padding:60px 20px;color:#999;}
.empty-state p{font-size:15px;}

/* Vacation fields */
.vacation-fields{background:#fff8e1;border:1px solid #ffe082;border-radius:8px;padding:16px;margin-bottom:16px;}
.vacation-fields h4{font-size:14px;margin-bottom:12px;color:#f57f17;}

@media(max-width:900px){
  .left-panel{display:none;}
  .doc-sidebar{display:none;}
  .doc-paper{padding:20px;}
  .form-row{flex-direction:column;gap:0;}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ============ DATA LAYER ============
const DEFAULT_USERS = [
  {id:'u1',name:'고단비',role:'대리',dept:'영업본부',color:'#2196F3',pw:'1234'},
  {id:'u2',name:'김상후',role:'대표이사',dept:'다우그룹',color:'#4caf50',pw:'1234'},
  {id:'u3',name:'구정모',role:'부사장',dept:'다우그룹',color:'#ff9800',pw:'1234'},
  {id:'u4',name:'이수진',role:'과장',dept:'기획부',color:'#9c27b0',pw:'1234'},
  {id:'u5',name:'박민호',role:'부장',dept:'개발본부',color:'#e91e63',pw:'1234'},
  {id:'u6',name:'정하윤',role:'사원',dept:'영업본부',color:'#00bcd4',pw:'1234'},
];

const DEFAULT_DOC_TYPES = [
  {id:'dt1',name:'업무기안',fields:['title','execDate','coopDept','agreement','content']},
  {id:'dt2',name:'휴가신청서',fields:['title','vacStart','vacEnd','vacType','vacReason'],isVacation:true},
  {id:'dt3',name:'지출결의서',fields:['title','expenseAmount','expensePurpose','content']},
  {id:'dt4',name:'출장신청서',fields:['title','tripDest','tripStart','tripEnd','tripPurpose']},
];

const DEFAULT_SETTINGS = {
  companyName: '다우그룹',
  docNumFormat: 'DOC-{YYYY}-{NUM:4}', // {YYYY}=year, {NUM:N}=zero-padded counter
  docCounter: 0,
};

const COLORS = ['#2196F3','#4caf50','#ff9800','#9c27b0','#e91e63','#00bcd4','#795548','#607d8b','#f44336','#3f51b5'];

function LS(k,v){ if(v===undefined){try{return JSON.parse(localStorage.getItem(k));}catch{return null;}} localStorage.setItem(k,JSON.stringify(v)); }

function getUsers(){ return LS('ea_users') || DEFAULT_USERS; }
function setUsers(u){ LS('ea_users',u); }
function getDocs(){ return LS('ea_docs') || []; }
function setDocs(d){ LS('ea_docs',d); }
function getDocTypes(){ return LS('ea_doctypes') || DEFAULT_DOC_TYPES; }
function setDocTypes(t){ LS('ea_doctypes',t); }
function getSettings(){ return LS('ea_settings') || DEFAULT_SETTINGS; }
function setSettings(s){ LS('ea_settings',s); }
function getEvents(){ return LS('ea_events') || []; }
function setEvents(e){ LS('ea_events',e); }
function getCurUser(){ try{return JSON.parse(sessionStorage.getItem('ea_user'));}catch{return null;} }
function setCurUser(u){ sessionStorage.setItem('ea_user',JSON.stringify(u)); }

// ============ STATE ============
let S = {
  user: getCurUser(),
  view: 'pending', // pending,received,scheduled,mydrafts,drafts,myapproved,deptall,view,create,settings,calendar,register
  docId: null,
  modal: null, // null | 'reject' | 'event' | 'eventView'
  calYear: new Date().getFullYear(),
  calMonth: new Date().getMonth(),
  calSelectedDate: null,
  settingsTab: 'profile',
  editEventId: null,
  loginMode: 'select', // 'select' | 'password' | 'register'
  loginUserId: null,
};

// ============ HELPERS ============
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(iso){if(!iso)return '';const d=new Date(iso);return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;}
function fmtDateTime(iso){if(!iso)return '';const d=new Date(iso);const days=['일','월','화','수','목','금','토'];return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}(${days[d.getDay()]})`;}
function fmtFull(iso){if(!iso)return '';const d=new Date(iso);return `${fmtDate(iso)} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function fmtDateInput(iso){if(!iso)return '';const d=new Date(iso);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

function genDocNum(){
  const s=getSettings();
  s.docCounter=(s.docCounter||0)+1;
  setSettings(s);
  const y=new Date().getFullYear();
  let fmt=s.docNumFormat||'DOC-{YYYY}-{NUM:4}';
  fmt=fmt.replace('{YYYY}',y);
  fmt=fmt.replace(/\{NUM:(\d+)\}/,(m,n)=>String(s.docCounter).padStart(parseInt(n),'0'));
  return fmt;
}

function getUser(id){return getUsers().find(u=>u.id===id);}
function docStatus(doc){
  if(doc.status==='rejected')return 'rejected';
  if(doc.status==='draft')return 'draft';
  if(doc.approvalLine.every(a=>a.status==='approved'))return 'approved';
  return 'pending';
}
function docStatusLabel(doc){ return {draft:'임시저장',pending:'결재 진행중',approved:'결재 완료',rejected:'반려'}[docStatus(doc)]; }
function prevApproved(doc,uid){
  const i=doc.approvalLine.findIndex(a=>a.userId===uid);
  if(i<=0)return true;
  return doc.approvalLine[i-1].status==='approved';
}

// ============ RENDER ============
function R(){
  const app=document.getElementById('app');
  if(!S.user){app.innerHTML=renderAuth();return;}
  app.innerHTML=`<div class="app">${renderIconSidebar()}${renderLeftPanel()}<div class="main-area">${renderTopBar()}<div class="content">${renderContent()}</div></div></div>${renderModal()}`;
}

// ---- AUTH ----
function renderAuth(){
  const users=getUsers();
  if(S.loginMode==='register') return renderRegister();
  if(S.loginMode==='password'){
    const u=getUser(S.loginUserId);
    return `<div class="login-page"><div class="login-box">
      <h2>전자결재 시스템</h2>
      <p class="subtitle">${esc(u.name)} ${esc(u.role)}(으)로 로그인</p>
      <div class="form-group"><label>비밀번호</label><input type="password" id="pw-input" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div id="login-error" style="color:#c62828;font-size:12px;margin-bottom:12px;"></div>
      <button class="btn primary" style="width:100%;padding:12px;font-size:15px;" onclick="doLogin()">로그인</button>
      <p style="text-align:center;margin-top:12px;"><a style="color:#1976D2;font-size:13px;cursor:pointer" onclick="S.loginMode='select';R();">&#8592; 돌아가기</a></p>
    </div></div>`;
  }
  return `<div class="login-page"><div class="login-box">
    <h2>전자결재 시스템</h2>
    <p class="subtitle">${esc(getSettings().companyName)} | 사용자를 선택하세요</p>
    <div class="user-cards">${users.map(u=>`
      <div class="user-card" onclick="S.loginUserId='${u.id}';S.loginMode='password';R();">
        <div class="cn">${esc(u.name)}</div>
        <div class="cr">${esc(u.role)} | ${esc(u.dept)}</div>
      </div>`).join('')}
    </div>
    <div class="login-divider">또는</div>
    <button class="btn primary" style="width:100%;padding:12px;font-size:14px;" onclick="S.loginMode='register';R();">회원가입</button>
  </div></div>`;
}

function renderRegister(){
  const depts=[...new Set(getUsers().map(u=>u.dept))];
  return `<div class="login-page"><div class="login-box">
    <h2>회원가입</h2>
    <p class="subtitle">새 계정을 등록하세요</p>
    <div class="form-group"><label>이름</label><input id="reg-name" placeholder="이름"></div>
    <div class="form-group"><label>직급</label>

// ---- DOC LIST ----
function getFilteredDocs(){
  const docs2=getDocs(),u=S.user;
  switch(S.view){
    case 'pending': return docs2.filter(d=>{if(d.status==='draft')return false;const l=d.approvalLine.find(a=>a.userId===u.id);return l&&l.status==='pending'&&docStatus(d)==='pending'&&prevApproved(d,u.id);});
    case 'received': return docs2.filter(d=>{if(d.status==='draft')return false;const l=d.approvalLine.find(a=>a.userId===u.id);return l&&d.authorId!==u.id;});
    case 'scheduled': return docs2.filter(d=>{if(d.status==='draft')return false;const l=d.approvalLine.find(a=>a.userId===u.id);return l&&l.status==='pending'&&!prevApproved(d,u.id);});
    case 'mydrafts': return docs2.filter(d=>d.authorId===u.id);
    case 'drafts': return docs2.filter(d=>d.authorId===u.id&&d.status==='draft');
    case 'myapproved': return docs2.filter(d=>{const l=d.approvalLine.find(a=>a.userId===u.id);return l&&(l.status==='approved'||l.status==='rejected');});
    case 'deptall': return docs2.filter(d=>{const a=getUser(d.authorId);return a&&a.dept===u.dept&&d.status!=='draft';});
    default: return docs2;
  }
}

function renderDocList(){
  const filtered=getFilteredDocs();
  if(!filtered.length) return `<div class="empty-state"><p>문서가 없습니다.</p></div>`;
  return `<table class="doc-table"><thead><tr><th>상태</th><th>문서종류</th><th>문서번호</th><th>제목</th><th>기안자</th><th>소속</th><th>기안일</th><th>결재현황</th></tr></thead><tbody>
    ${filtered.map(d=>{const a=getUser(d.authorId);const st=docStatus(d);const ap=d.approvalLine.filter(x=>x.status==='approved').length;const tot=d.approvalLine.length;const dt=getDocTypes().find(t=>t.id===d.docTypeId);
    return `<tr><td><span class="status-badge ${st}">${docStatusLabel(d)}</span></td><td>${esc(dt?dt.name:'업무기안')}</td><td>${d.docNumber||'-'}</td><td><span class="doc-title-link" onclick="S.docId='${d.id}';S.view='view';R();">${esc(d.title)}</span></td><td>${esc(a?a.name:'')}</td><td>${esc(a?a.dept:'')}</td><td>${d.createdAt?new Date(d.createdAt).toLocaleDateString('ko-KR'):''}</td><td>${ap}/${tot}</td></tr>`;}).join('')}
  </tbody></table>`;
}

function renderDynamicFields(dtId){
  const dt=getDocTypes().find(t=>t.id===dtId);
  if(!dt)return '';
  let h='';
  const f=dt.fields||[];
  if(f.includes('execDate')||f.includes('coopDept')){
    h+=`<div class="form-row">`;
    if(f.includes('execDate')) h+=`<div class="form-group"><label>시행일자</label><input type="date" id="doc-execDate"></div>`;
    if(f.includes('coopDept')) h+=`<div class="form-group"><label>협조부서</label><input id="doc-coopDept" placeholder="협조부서"></div>`;
    h+=`</div>`;
  }
  if(f.includes('agreement')) h+=`<div class="form-group"><label>합의</label><input id="doc-agreement" placeholder="합의 내용"></div>`;
  if(dt.isVacation){
    h+=`<div class="vacation-fields"><h4>&#127796; 휴가 정보</h4>
      <div class="form-row"><div class="form-group"><label>휴가 종류</label><select id="doc-vacType"><option>연차</option><option>반차(오전)</option><option>반차(오후)</option><option>병가</option><option>경조사</option><option>기타</option></select></div></div>
      <div class="form-row"><div class="form-group"><label>시작일</label><input type="date" id="doc-vacStart"></div><div class="form-group"><label>종료일</label><input type="date" id="doc-vacEnd"></div></div>
      <div class="form-group"><label>사유</label><textarea id="doc-vacReason" style="min-height:80px;" placeholder="휴가 사유를 입력하세요"></textarea></div>
    </div>`;
  }
  if(f.includes('expenseAmount')||f.includes('expensePurpose')){
    h+=`<div class="form-row">`;
    if(f.includes('expenseAmount')) h+=`<div class="form-group"><label>금액 (원)</label><input type="number" id="doc-expenseAmount" placeholder="0"></div>`;
    if(f.includes('expensePurpose')) h+=`<div class="form-group"><label>지출목적</label><input id="doc-expensePurpose" placeholder="지출 목적"></div>`;
    h+=`</div>`;
  }
  if(f.includes('tripDest')||f.includes('tripStart')||f.includes('tripEnd')){
    h+=`<div class="form-row">`;
    if(f.includes('tripDest')) h+=`<div class="form-group"><label>출장지</label><input id="doc-tripDest" placeholder="출장지"></div>`;
    h+=`</div><div class="form-row">`;
    if(f.includes('tripStart')) h+=`<div class="form-group"><label>출장 시작일</label><input type="date" id="doc-tripStart"></div>`;
    if(f.includes('tripEnd')) h+=`<div class="form-group"><label>출장 종료일</label><input type="date" id="doc-tripEnd"></div>`;
    h+=`</div>`;
    if(f.includes('tripPurpose')) h+=`<div class="form-group"><label>출장 목적</label><textarea id="doc-tripPurpose" style="min-height:80px;" placeholder="출장 목적"></textarea></div>`;
  }
  if(f.includes('content')) h+=`<div class="form-group"><label>내용</label><textarea id="doc-content" placeholder="문서 내용을 입력하세요"></textarea></div>`;
  return h;
}

// ---- DOC VIEW ----
function renderDocView(){
  const docs2=getDocs();
  const doc=docs2.find(d=>d.id===S.docId);
  if(!doc) return `<div class="empty-state"><p>문서를 찾을 수 없습니다.</p></div>`;
  const author=getUser(doc.authorId);
  const st=docStatus(doc);
  const isMyTurn=doc.approvalLine.some(a=>a.userId===S.user.id&&a.status==='pending'&&prevApproved(doc,S.user.id))&&st==='pending';
  const isAuthor=doc.authorId===S.user.id;
  const dt=getDocTypes().find(t=>t.id===doc.docTypeId);
  const dtName=dt?dt.name:'업무기안';

  let detailRows='';
  if(doc.execDate) detailRows+=`<tr><th>시행일자</th><td>${esc(doc.execDate)}</td><th>협조부서</th><td>${esc(doc.coopDept||'')}</td></tr>`;
  if(doc.agreement) detailRows+=`<tr><th>합의</th><td colspan="3">${esc(doc.agreement)}</td></tr>`;
  if(dt&&dt.isVacation){
    detailRows+=`<tr><th>휴가종류</th><td>${esc(doc.vacType||'')}</td><th>기간</th><td>${esc(doc.vacStart||'')} ~ ${esc(doc.vacEnd||'')}</td></tr>`;
    if(doc.vacReason) detailRows+=`<tr><th>사유</th><td colspan="3">${esc(doc.vacReason)}</td></tr>`;
  }
  if(doc.expenseAmount) detailRows+=`<tr><th>금액</th><td>${Number(doc.expenseAmount).toLocaleString()}원</td><th>목적</th><td>${esc(doc.expensePurpose||'')}</td></tr>`;
  if(doc.tripDest) detailRows+=`<tr><th>출장지</th><td>${esc(doc.tripDest)}</td><th>기간</th><td>${esc(doc.tripStart||'')} ~ ${esc(doc.tripEnd||'')}</td></tr>`;
  if(doc.tripPurpose) detailRows+=`<tr><th>출장목적</th><td colspan="3">${esc(doc.tripPurpose)}</td></tr>`;
  detailRows+=`<tr><th>제목</th><td colspan="3">${esc(doc.title)}</td></tr>`;

  return `<div class="doc-container"><div class="doc-main">
    <div class="doc-toolbar">
      ${isMyTurn?`<button class="btn success" onclick="approveDoc('${doc.id}')">&#10003; 승인</button><button class="btn danger" onclick="S.modal='reject';R();">&#10005; 반려</button>`:''}
      ${isAuthor&&st==='draft'?`<button class="btn primary" onclick="resubmitDoc('${doc.id}')">&#9993; 결재 상신</button>`:''}
      ${isAuthor&&st==='pending'?`<button class="btn danger" onclick="cancelDoc('${doc.id}')">&#128281; 결재 회수</button>`:''}
      <button class="btn" onclick="S.view='pending';R();">&#8592; 목록</button>
    </div>
    <div class="doc-paper">
      <h1>${dtName.split('').join(' ')}</h1>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;flex-wrap:wrap;gap:16px;">
        <table class="doc-meta-table">
          <tr><th>기안자</th><td>${esc(author?author.name:'')}</td></tr>
          <tr><th>소속</th><td>${esc(author?author.dept:'')}</td></tr>
          <tr><th>기안일</th><td>${fmtDateTime(doc.createdAt)}</td></tr>
          <tr><th>문서번호</th><td>${doc.docNumber||'<span style="color:#999">미부여</span>'}</td></tr>
        </table>
        <table class="approval-table">
          <tr><th rowspan="2" style="writing-mode:vertical-lr;letter-spacing:4px;">신<br>청</th>
            ${doc.approvalLine.map(a=>{const u2=getUser(a.userId);return `<th>${esc(u2?u2.role:'')}</th>`;}).join('')}
          </tr><tr>
            ${doc.approvalLine.map(a=>{const u2=getUser(a.userId);
              if(a.status==='approved') return `<td class="stamp-cell"><div class="stamp"><div class="stamp-circle">승인</div><div class="stamp-name">${esc(u2?u2.name:'')}</div><div class="stamp-date">${fmtDate(a.actionAt)}</div></div></td>`;
              if(a.status==='rejected') return `<td class="stamp-cell"><div class="stamp"><div class="stamp-circle rejected">반려</div><div class="stamp-name">${esc(u2?u2.name:'')}</div><div class="stamp-date">${fmtDate(a.actionAt)}</div></div></td>`;
              return `<td class="stamp-cell"><span class="stamp-pending">${esc(u2?u2.name:'')}</span></td>`;
            }).join('')}
          </tr>
        </table>
      </div>
      <table class="doc-detail-table">${detailRows}</table>
      ${doc.content?`<p class="doc-body-label">- 아 래 -</p><div class="doc-body">${esc(doc.content)}</div>`:''}
    </div>
  </div>
  <div class="doc-sidebar">
    <div class="sidebar-card"><div class="sidebar-card-header"><h4>결재선</h4></div>
      ${doc.approvalLine.map(a=>{const u2=getUser(a.userId);const cur=a.status==='pending'&&prevApproved(doc,a.userId)&&st==='pending';
        let sl='',sc='';
        if(a.status==='approved'){sl='결재 승인';sc='done';}else if(a.status==='rejected'){sl='반려';sc='rejected';}else if(cur){sl='결재 대기';sc='waiting';}else{sl='대기';sc='';}
        return `<div class="approval-line-item ${cur?'current':''}">
          <div class="approval-avatar" style="background:${u2?u2.color:'#999'}">${u2?u2.name[0]:'?'}</div>
          <div class="approval-line-info"><div class="name">${esc(u2?u2.name:'')} ${esc(u2?u2.role:'')}</div><div class="dept">${esc(u2?u2.dept:'')}</div>
            ${a.actionAt?`<div class="time">${fmtFull(a.actionAt)}</div>`:''}
            ${a.comment?`<div class="time" style="color:#c62828;">사유: ${esc(a.comment)}</div>`:''}
          </div>${sl?`<span class="als ${sc}">${sl}</span>`:''}</div>`;
      }).join('')}
    </div>
  </div></div>`;
}

// ---- CALENDAR ----
function renderCalendar(){
  const y=S.calYear,m=S.calMonth;
  const first=new Date(y,m,1);
  const last=new Date(y,m+1,0);
  const startDay=first.getDay();
  const totalDays=last.getDate();
  const today=new Date();const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  // Get vacation events from approved vacation docs
  const docs2=getDocs();
  const vacEvents=[];
  docs2.forEach(d=>{
    if(docStatus(d)!=='approved')return;
    const dt=getDocTypes().find(t=>t.id===d.docTypeId);
    if(!dt||!dt.isVacation)return;
    if(!d.vacStart||!d.vacEnd)return;
    const author=getUser(d.authorId);
    vacEvents.push({type:'vacation',title:`${author?author.name:'?'} ${d.vacType||'휴가'}`,start:d.vacStart,end:d.vacEnd,authorName:author?author.name:'',vacType:d.vacType||'휴가'});
  });
  const calEvents=getEvents();

  let cells='';
  // Previous month fill
  const prevLast=new Date(y,m,0).getDate();
  for(let i=startDay-1;i>=0;i--){
    const day=prevLast-i;
    cells+=`<div class="cal-cell other-month"><div class="day-num">${day}</div></div>`;
  }
  // Current month
  for(let d=1;d<=totalDays;d++){
    const dateStr=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday=dateStr===todayStr;
    // Find events for this day
    let evHtml='';
    vacEvents.forEach(ev=>{
      if(dateStr>=ev.start&&dateStr<=ev.end){
        const endLabel=dateStr===ev.start?` ~${ev.end.slice(5)}`:'';
        evHtml+=`<div class="cal-event vacation" title="${esc(ev.title)}${endLabel}">${esc(ev.title)}${endLabel}</div>`;
      }
    });
    calEvents.forEach(ev=>{
      if(dateStr>=ev.start&&dateStr<=ev.end){
        evHtml+=`<div class="cal-event event" title="${esc(ev.title)}" onclick="event.stopPropagation();viewEvent('${ev.id}')">${esc(ev.title)}</div>`;
      }
    });
    cells+=`<div class="cal-cell ${isToday?'today':''}" onclick="openEventModal('${dateStr}')"><div class="day-num">${d}</div>${evHtml}</div>`;
  }
  // Next month fill
  const remain=7-((startDay+totalDays)%7);
  if(remain<7) for(let i=1;i<=remain;i++) cells+=`<div class="cal-cell other-month"><div class="day-num">${i}</div></div>`;

  const monthNames=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  return `<div class="calendar-wrap">
    <div class="cal-header">
      <h3>&#128197; 캘린더</h3>
      <div class="cal-nav">
        <button onclick="calNav(-1)">&#9664;</button>
        <span>${y}년 ${monthNames[m]}</span>
        <button onclick="calNav(1)">&#9654;</button>
        <button onclick="S.calYear=new Date().getFullYear();S.calMonth=new Date().getMonth();R();">오늘</button>
      </div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:12px;font-size:12px;">
      <span><span class="cal-event vacation" style="display:inline-block;">&#127796;</span> 휴가</span>
      <span><span class="cal-event event" style="display:inline-block;">&#128197;</span> 행사</span>
    </div>
    <div class="cal-grid">
      <div class="cal-day-header">일</div><div class="cal-day-header">월</div><div class="cal-day-header">화</div><div class="cal-day-header">수</div><div class="cal-day-header">목</div><div class="cal-day-header">금</div><div class="cal-day-header">토</div>
      ${cells}
    </div>
  </div>`;
}

function doLogin(){

function doRegister(){
  const name=document.getElementById('reg-name').value.trim();
  const role=document.getElementById('reg-role').value;
  const dept=document.getElementById('reg-dept').value.trim();
  const pw=document.getElementById('reg-pw').value;
  const pw2=document.getElementById('reg-pw2').value;
  const err=document.getElementById('reg-error');
  if(!name){err.textContent='이름을 입력하세요.';return;}
  if(!dept){err.textContent='부서를 입력하세요.';return;}
  if(!pw){err.textContent='비밀번호를 입력하세요.';return;}
  if(pw!==pw2){err.textContent='비밀번호가 일치하지 않습니다.';return;}

function onDocTypeChange(){
  const sel=document.getElementById('doc-type').value;
  const dt=getDocTypes().find(t=>t.id===sel);
  document.getElementById('dynamic-fields').innerHTML=renderDynamicFields(sel);
  document.getElementById('doc-type-title').textContent=dt?dt.name:'문서';
}

function getApprovers(){
  const sels=document.querySelectorAll('.approver-select');
  const r=[];sels.forEach(s=>{if(s.value)r.push(s.value);});return r;
}

function collectDocFields(){
  const dtId=document.getElementById('doc-type').value;
  const dt=getDocTypes().find(t=>t.id===dtId);
  const data={docTypeId:dtId,title:document.getElementById('doc-title').value.trim()};
  const ids=['execDate','coopDept','agreement','content','vacStart','vacEnd','vacType','vacReason','expenseAmount','expensePurpose','tripDest','tripStart','tripEnd','tripPurpose'];
  ids.forEach(id=>{const el=document.getElementById('doc-'+id);if(el)data[id]=el.value;});
  return data;
}

function submitDoc(){
  const data=collectDocFields();
  if(!data.title){alert('제목을 입력하세요.');return;}
  const approvers=getApprovers();
  if(!approvers.length){alert('결재자를 1명 이상 선택하세요.');return;}
  const doc={id:'doc_'+Date.now(),...data,authorId:S.user.id,status:'submitted',docNumber:null,createdAt:new Date().toISOString(),
    approvalLine:approvers.map(uid=>({userId:uid,status:'pending',actionAt:null,comment:''}))};
  const docs2=getDocs();docs2.unshift(doc);setDocs(docs2);
  S.view='mydrafts';R();
}

function saveDraft(){
  const data=collectDocFields();
  data.title=data.title||'(제목 없음)';
  const approvers=getApprovers();
  const doc={id:'doc_'+Date.now(),...data,authorId:S.user.id,status:'draft',docNumber:null,createdAt:new Date().toISOString(),
    approvalLine:approvers.map(uid=>({userId:uid,status:'pending',actionAt:null,comment:''}))};
  const docs2=getDocs();docs2.unshift(doc);setDocs(docs2);
  S.view='drafts';R();
}

function resubmitDoc(id){const docs2=getDocs();const d=docs2.find(x=>x.id===id);if(!d)return;d.status='submitted';d.approvalLine.forEach(a=>{a.status='pending';a.actionAt=null;a.comment='';});setDocs(docs2);R();}
function cancelDoc(id){if(!confirm('결재를 회수하시겠습니까?'))return;const docs2=getDocs();const d=docs2.find(x=>x.id===id);if(!d)return;d.status='draft';d.approvalLine.forEach(a=>{a.status='pending';a.actionAt=null;a.comment='';});setDocs(docs2);R();}

function approveDoc(id){
  const docs2=getDocs();const d=docs2.find(x=>x.id===id);if(!d)return;
  const line=d.approvalLine.find(a=>a.userId===S.user.id&&a.status==='pending');if(!line)return;
  line.status='approved';line.actionAt=new Date().toISOString();
  if(d.approvalLine.every(a=>a.status==='approved')){d.status='approved';d.docNumber=genDocNum();}
  setDocs(docs2);R();
}

function rejectDoc(id){
  const docs2=getDocs();const d=docs2.find(x=>x.id===id);if(!d)return;
  const reason=document.getElementById('reject-reason').value.trim();
  const line=d.approvalLine.find(a=>a.userId===S.user.id&&a.status==='pending');if(!line)return;
  line.status='rejected';line.actionAt=new Date().toISOString();line.comment=reason;d.status='rejected';
  setDocs(docs2);S.modal=null;R();
}

function addSlot(){

}

  const types=getDocTypes();
  if(S.editDtId){
    const t=types.find(x=>x.id===S.editDtId);if(t){t.name=name;t.fields=fields;t.isVacation=isVac;}
  } else {
    types.push({id:'dt_'+Date.now(),name,fields,isVacation:isVac});
  }
  setDocTypes(types);S.modal=null;R();
}
function deleteDocType(id){if(!confirm('이 문서 종류를 삭제하시겠습니까?'))return;setDocTypes(getDocTypes().filter(t=>t.id!==id));R();}

function saveDocNum(){
  const s=getSettings();
  s.docNumFormat=document.getElementById('s-docfmt').value.trim()||'DOC-{YYYY}-{NUM:4}';
  s.docCounter=parseInt(document.getElementById('s-doccnt').value)||0;
  setSettings(s);alert('저장되었습니다.');R();
}
function saveCompany(){
  const s=getSettings();s.companyName=document.getElementById('s-company').value.trim()||'회사명';
  setSettings(s);alert('저장되었습니다.');R();
}

// Calendar actions
function calNav(dir){S.calMonth+=dir;if(S.calMonth<0){S.calMonth=11;S.calYear--;}if(S.calMonth>11){S.calMonth=0;S.calYear++;}R();}
function openEventModal(dateStr){S.calSelectedDate=dateStr;S.editEventId=null;S.modal='event';R();}
function viewEvent(id){S.editEventId=id;S.modal='eventView';R();}
function saveEvent(){
  const title=document.getElementById('ev-title').value.trim();if(!title){alert('행사명을 입력하세요.');return;}
  const start=document.getElementById('ev-start').value;const end=document.getElementById('ev-end').value||start;
  const desc=document.getElementById('ev-desc').value;const people=document.getElementById('ev-people').value;
  if(!start){alert('날짜를 입력하세요.');return;}
  const events=getEvents();
  if(S.editEventId){
    const ev=events.find(e=>e.id===S.editEventId);if(ev){ev.title=title;ev.start=start;ev.end=end;ev.desc=desc;ev.people=people;}
  } else {
    events.push({id:'ev_'+Date.now(),title,start,end,desc,people,createdBy:S.user.id});
  }
  setEvents(events);S.modal=null;S.editEventId=null;R();
}
function deleteEvent(id){if(!confirm('이 행사를 삭제하시겠습니까?'))return;setEvents(getEvents().filter(e=>e.id!==id));S.modal=null;S.editEventId=null;R();}
