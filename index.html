<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전자결재 시스템</title>
<style>
:root{--primary:#0ea5e9;--primary-dark:#0284c7;--primary-light:#e0f2fe;--success:#22c55e;--success-light:#dcfce7;--danger:#ef4444;--danger-light:#fef2f2;--warning:#f59e0b;--warning-light:#fffbeb;--gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;--gray-300:#cbd5e1;--gray-400:#94a3b8;--gray-500:#64748b;--gray-600:#475569;--gray-700:#334155;--gray-800:#1e293b;--gray-900:#0f172a;--sidebar-bg:#0f172a;--sidebar-hover:#1e293b;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);--shadow-md:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -2px rgba(0,0,0,.1);--shadow-lg:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -4px rgba(0,0,0,.1);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Pretendard','Malgun Gothic',sans-serif;background:var(--gray-50);color:var(--gray-800);font-size:14px;line-height:1.5;}
a{text-decoration:none;color:inherit;cursor:pointer;}
input,select,textarea,button{font-family:inherit;font-size:13px;}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px;}

/* === LAYOUT === */
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:60px;background:var(--sidebar-bg);display:flex;flex-direction:column;align-items:center;padding:8px 0;flex-shrink:0;transition:width .2s;z-index:100;}
.sidebar .logo-area{width:44px;height:44px;border-radius:10px;background:var(--primary);display:flex;align-items:center;justify-content:center;margin-bottom:12px;cursor:pointer;overflow:hidden;}
.sidebar .logo-area img{width:100%;height:100%;object-fit:contain;}
.sidebar .logo-text{color:#fff;font-weight:800;font-size:16px;}
.sb-item{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:10px;color:var(--gray-400);cursor:pointer;margin-bottom:4px;transition:.15s;position:relative;font-size:20px;}
.sb-item:hover{background:var(--sidebar-hover);color:#fff;}
.sb-item.active{background:var(--primary);color:#fff;}
.sb-item .badge{position:absolute;top:4px;right:4px;background:var(--danger);color:#fff;font-size:9px;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;}
.sb-bottom{margin-top:auto;padding-bottom:8px;}

/* Left nav */
.left-nav{width:220px;background:#fff;border-right:1px solid var(--gray-200);overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;}
.ln-header{padding:20px 16px 12px;font-size:15px;font-weight:700;color:var(--gray-800);}
.ln-btn{display:block;margin:0 12px 12px;padding:10px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius);font-size:13px;font-weight:600;cursor:pointer;text-align:center;transition:.2s;}
.ln-btn:hover{background:var(--primary-dark);}
.ln-section{padding:4px 0;}
.ln-section-title{padding:8px 16px 4px;font-size:11px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.5px;}
.ln-item{padding:8px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--gray-600);transition:.1s;border-left:3px solid transparent;margin:1px 0;}
.ln-item:hover{background:var(--gray-50);color:var(--gray-800);}
.ln-item.active{background:var(--primary-light);color:var(--primary-dark);font-weight:600;border-left-color:var(--primary);}
.ln-item .cnt{margin-left:auto;background:var(--gray-200);color:var(--gray-600);font-size:11px;padding:1px 7px;border-radius:10px;font-weight:600;}
.ln-item .cnt.alert{background:var(--danger);color:#fff;}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{height:52px;background:#fff;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0;}
.topbar h2{font-size:15px;font-weight:700;}
.topbar .bc{color:var(--gray-400);font-size:12px;}
.topbar .sp{flex:1;}
.topbar .search-box{padding:7px 14px;border:1px solid var(--gray-200);border-radius:20px;font-size:12px;width:180px;background:var(--gray-50);transition:.2s;}
.topbar .search-box:focus{outline:none;border-color:var(--primary);background:#fff;}
.user-chip{display:flex;align-items:center;gap:8px;padding:4px 12px 4px 4px;border-radius:20px;background:var(--gray-50);cursor:pointer;transition:.15s;}
.user-chip:hover{background:var(--gray-100);}
.avatar{width:32px;height:32px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.avatar.sm{width:28px;height:28px;font-size:11px;}
.avatar.lg{width:48px;height:48px;font-size:18px;}
.content{flex:1;overflow-y:auto;padding:24px;}

/* Cards */
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.card-header{padding:16px 20px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;gap:8px;}
.card-header h4{font-size:14px;font-weight:700;}
.card-body{padding:16px 20px;}

/* Buttons */
.btn{padding:7px 16px;border:1px solid var(--gray-200);background:#fff;border-radius:6px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:.15s;font-weight:500;color:var(--gray-700);}
.btn:hover{background:var(--gray-50);border-color:var(--gray-300);}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary);}
.btn-primary:hover{background:var(--primary-dark);}
.btn-success{background:var(--success);color:#fff;border-color:var(--success);}
.btn-danger{background:#fff;color:var(--danger);border-color:#fca5a5;}
.btn-danger:hover{background:var(--danger-light);}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-icon{width:32px;height:32px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:6px;}

/* Tables */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{background:var(--gray-50);padding:10px 14px;text-align:left;font-size:12px;font-weight:600;color:var(--gray-500);border-bottom:1px solid var(--gray-200);white-space:nowrap;}
.tbl td{padding:10px 14px;border-bottom:1px solid var(--gray-100);font-size:13px;}
.tbl tr:hover td{background:var(--gray-50);}
.tbl .link{color:var(--primary);cursor:pointer;font-weight:500;}
.tbl .link:hover{text-decoration:underline;}

/* Badge */
.badge-s{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:600;}
.badge-s.draft{background:var(--warning-light);color:#b45309;}
.badge-s.pending{background:var(--primary-light);color:var(--primary-dark);}
.badge-s.approved{background:var(--success-light);color:#15803d;}
.badge-s.rejected{background:var(--danger-light);color:#b91c1c;}

/* Form */
.fg{margin-bottom:14px;}
.fg>label{display:block;font-size:12px;font-weight:600;margin-bottom:5px;color:var(--gray-600);}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 12px;border:1px solid var(--gray-200);border-radius:6px;font-size:13px;transition:.15s;background:#fff;}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(14,165,233,.1);}
.fg textarea{min-height:160px;resize:vertical;line-height:1.7;}
.fr{display:flex;gap:14px;}
.fr .fg{flex:1;}

/* Doc paper */
.doc-container{max-width:1200px;margin:0 auto;display:flex;gap:20px;}
.doc-main{flex:1;min-width:0;}
.doc-sidebar{width:280px;flex-shrink:0;}
.doc-toolbar{display:flex;align-items:center;gap:8px;padding:12px 20px;background:var(--gray-50);border-bottom:1px solid var(--gray-200);flex-wrap:wrap;}
.doc-paper{padding:40px 48px;background:#fff;min-height:500px;}
.doc-paper h1{text-align:center;font-size:26px;letter-spacing:10px;margin-bottom:28px;font-weight:800;}

.meta-tbl{border-collapse:collapse;margin-bottom:20px;}
.meta-tbl th,.meta-tbl td{border:1px solid var(--gray-400);padding:7px 14px;font-size:12px;}
.meta-tbl th{background:var(--gray-100);font-weight:600;width:72px;text-align:center;}
.approval-tbl{border-collapse:collapse;}
.approval-tbl th,.approval-tbl td{border:1px solid var(--gray-400);padding:4px 6px;text-align:center;font-size:11px;}
.approval-tbl th{background:var(--gray-100);font-weight:600;}
.stamp-cell{width:76px;height:68px;vertical-align:middle;}
.stamp{display:inline-flex;flex-direction:column;align-items:center;}
.stamp-circle{width:44px;height:44px;border:2px solid #dc2626;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#dc2626;font-size:12px;font-weight:800;overflow:hidden;}
.stamp-circle img{width:100%;height:100%;object-fit:contain;}
.stamp-circle.rej{border-color:var(--gray-500);color:var(--gray-500);}
.stamp-name{font-size:10px;margin-top:2px;}
.stamp-date{font-size:9px;color:var(--gray-400);}

.detail-tbl{width:100%;border-collapse:collapse;margin-bottom:16px;clear:both;}
.detail-tbl th,.detail-tbl td{border:1px solid var(--gray-400);padding:7px 14px;font-size:12px;}
.detail-tbl th{background:var(--gray-100);font-weight:600;width:90px;text-align:center;}

.doc-body{padding:16px 0;white-space:pre-wrap;line-height:1.8;font-size:13px;min-height:100px;}
.doc-body-label{text-align:center;color:var(--gray-400);font-size:12px;margin-top:12px;}

/* Sidebar approval line */
.al-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--gray-100);}
.al-item:last-child{border-bottom:none;}
.al-item.current{background:var(--warning-light);}
.al-info{flex:1;min-width:0;}
.al-info .n{font-size:13px;font-weight:600;}
.al-info .d{font-size:11px;color:var(--gray-400);}
.al-status{font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px;white-space:nowrap;}
.al-status.done{background:var(--success-light);color:#15803d;}
.al-status.wait{background:var(--warning-light);color:#b45309;}
.al-status.rej{background:var(--danger-light);color:#b91c1c;}

/* Approver slot */
.ap-slot{display:flex;align-items:center;gap:8px;padding:8px;background:var(--gray-50);border-radius:6px;margin-bottom:6px;}
.ap-slot select{flex:1;padding:6px 8px;border:1px solid var(--gray-200);border-radius:4px;font-size:12px;}
.ap-slot .sl{font-size:11px;color:var(--gray-400);width:52px;flex-shrink:0;font-weight:600;}
.rm-b{background:none;border:none;color:var(--gray-400);cursor:pointer;font-size:16px;padding:0 4px;transition:.1s;}
.rm-b:hover{color:var(--danger);}
.add-b{padding:6px;border:1px dashed var(--gray-300);background:transparent;border-radius:6px;font-size:11px;color:var(--gray-400);cursor:pointer;width:100%;margin-top:4px;transition:.15s;}
.add-b:hover{border-color:var(--primary);color:var(--primary);}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,23,42,.5);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(2px);}
.modal{background:#fff;border-radius:12px;padding:24px;width:500px;max-width:92%;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal h3{font-size:17px;font-weight:700;margin-bottom:16px;}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;}

/* Login */
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#0ea5e9 100%);}
.login-box{background:#fff;border-radius:16px;padding:40px;width:420px;box-shadow:var(--shadow-lg);}
.login-box h2{text-align:center;font-size:22px;font-weight:800;margin-bottom:4px;}
.login-box .sub{text-align:center;color:var(--gray-400);font-size:13px;margin-bottom:28px;}
.ucards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.ucard{padding:12px;border:2px solid var(--gray-200);border-radius:10px;cursor:pointer;text-align:center;transition:.15s;}
.ucard:hover{border-color:var(--primary);background:var(--primary-light);}
.ucard .cn{font-size:14px;font-weight:700;}
.ucard .cr{font-size:11px;color:var(--gray-400);margin-top:2px;}
.login-div{text-align:center;margin:20px 0;color:var(--gray-300);font-size:12px;position:relative;}
.login-div::before,.login-div::after{content:'';position:absolute;top:50%;width:38%;height:1px;background:var(--gray-200);}
.login-div::before{left:0;}.login-div::after{right:0;}

/* Dashboard */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:20px;}
.dash-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;transition:.2s;}
.dash-card:hover{box-shadow:var(--shadow-md);}
.dash-card .dc-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:12px;}
.dash-card .dc-val{font-size:28px;font-weight:800;color:var(--gray-800);}
.dash-card .dc-label{font-size:12px;color:var(--gray-400);margin-top:2px;}
.dash-recent{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.dash-recent .dr-header{padding:16px 20px;font-weight:700;font-size:14px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;}
.dash-recent .dr-item{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--gray-100);cursor:pointer;transition:.1s;}
.dash-recent .dr-item:hover{background:var(--gray-50);}
.dash-recent .dr-item:last-child{border-bottom:none;}
.dr-info{flex:1;min-width:0;}
.dr-info .t{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dr-info .d{font-size:11px;color:var(--gray-400);}

/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
.cal-dh{padding:10px;text-align:center;font-size:11px;font-weight:700;color:var(--gray-500);background:var(--gray-50);border-bottom:1px solid var(--gray-200);}
.cal-dh:first-child{color:var(--danger);}
.cal-dh:last-child{color:var(--primary);}
.cal-c{min-height:90px;padding:4px;border:1px solid var(--gray-100);cursor:pointer;transition:.1s;}
.cal-c:hover{background:var(--primary-light);}
.cal-c.other{background:var(--gray-50);}.cal-c.other .dn{color:var(--gray-300);}
.cal-c.today{background:#eff6ff;}
.cal-c .dn{font-size:11px;font-weight:600;margin-bottom:2px;}
.cal-c:nth-child(7n+1) .dn{color:var(--danger);}
.cal-c:nth-child(7n) .dn{color:var(--primary);}
.cal-ev{font-size:9px;padding:2px 4px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
.cal-ev.vac{background:#fef3c7;color:#92400e;border-left:2px solid var(--warning);}
.cal-ev.evt{background:var(--primary-light);color:var(--primary-dark);border-left:2px solid var(--primary);}

/* Settings */
.settings-page{max-width:800px;margin:0 auto;}
.s-section{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;margin-bottom:16px;}
.s-section h3{font-size:15px;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--gray-100);}
.s-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--gray-100);}
.s-row:last-child{border-bottom:none;}
.s-row>label{width:100px;font-size:12px;font-weight:600;flex-shrink:0;color:var(--gray-600);}
.s-row input,.s-row select{flex:1;padding:7px 10px;border:1px solid var(--gray-200);border-radius:6px;font-size:13px;}
.ul-item{display:flex;align-items:center;gap:12px;padding:10px;background:var(--gray-50);border-radius:var(--radius);margin-bottom:6px;}
.ul-item .ui{flex:1;}.ul-item .un{font-weight:600;font-size:13px;}.ul-item .ur{font-size:11px;color:var(--gray-400);}

/* Inventory */
.inv-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:20px;}
.inv-stat{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;text-align:center;}
.inv-stat .iv{font-size:24px;font-weight:800;}
.inv-stat .il{font-size:11px;color:var(--gray-400);margin-top:4px;}

/* Tabs */
.tabs{display:flex;border-bottom:2px solid var(--gray-200);margin-bottom:16px;gap:4px;}
.tab{padding:10px 18px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;color:var(--gray-400);transition:.15s;font-weight:500;border-radius:6px 6px 0 0;}
.tab:hover{color:var(--gray-700);background:var(--gray-50);}
.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:700;}

/* Signature */
.sig-area{width:160px;height:60px;border:2px dashed var(--gray-300);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:.15s;background:var(--gray-50);}
.sig-area:hover{border-color:var(--primary);background:var(--primary-light);}
.sig-area img{max-width:100%;max-height:100%;object-fit:contain;}
.sig-area .sig-placeholder{font-size:11px;color:var(--gray-400);text-align:center;}

/* Form Builder */
.fb-wrap{display:flex;gap:16px;min-height:400px;}
.fb-palette{width:180px;flex-shrink:0;}
.fb-palette .fb-item{padding:10px;border:1px solid var(--gray-200);border-radius:6px;margin-bottom:6px;cursor:grab;font-size:12px;display:flex;align-items:center;gap:8px;transition:.15s;background:#fff;}
.fb-palette .fb-item:hover{border-color:var(--primary);background:var(--primary-light);}
.fb-canvas{flex:1;border:2px dashed var(--gray-200);border-radius:var(--radius);padding:16px;min-height:400px;background:#fff;}
.fb-canvas.drag-over{border-color:var(--primary);background:var(--primary-light);}
.fb-field{padding:10px 14px;border:1px solid var(--gray-200);border-radius:6px;margin-bottom:8px;background:#fff;display:flex;align-items:center;gap:8px;cursor:move;transition:.15s;}
.fb-field:hover{box-shadow:var(--shadow);border-color:var(--primary);}
.fb-field .fb-label{flex:1;font-size:13px;font-weight:500;}
.fb-field .fb-type{font-size:10px;color:var(--gray-400);background:var(--gray-100);padding:2px 6px;border-radius:4px;}

/* Vacation fields */
.vac-box{background:var(--warning-light);border:1px solid #fde68a;border-radius:var(--radius);padding:16px;margin-bottom:14px;}
.vac-box h4{font-size:13px;margin-bottom:10px;color:#92400e;}

.empty{text-align:center;padding:60px 20px;color:var(--gray-400);}
.empty p{font-size:14px;}

@media(max-width:768px){.left-nav,.doc-sidebar{display:none;}.doc-paper{padding:20px;}.fr{flex-direction:column;gap:0;}.dash-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// =============== DATA ===============
const DEF_USERS=[
  {id:'u1',name:'고단비',role:'대리',dept:'영업본부',color:'#0ea5e9',pw:'1234',signature:null},
  {id:'u2',name:'김상후',role:'대표이사',dept:'다우그룹',color:'#22c55e',pw:'1234',signature:null},
  {id:'u3',name:'구정모',role:'부사장',dept:'다우그룹',color:'#f59e0b',pw:'1234',signature:null},
  {id:'u4',name:'이수진',role:'과장',dept:'기획부',color:'#a855f7',pw:'1234',signature:null},
  {id:'u5',name:'박민호',role:'부장',dept:'개발본부',color:'#ec4899',pw:'1234',signature:null},
  {id:'u6',name:'정하윤',role:'사원',dept:'영업본부',color:'#06b6d4',pw:'1234',signature:null},
];
const DEF_DTYPES=[
  {id:'dt1',name:'업무기안',fields:[{id:'f1',label:'시행일자',type:'date'},{id:'f2',label:'협조부서',type:'text'},{id:'f3',label:'합의',type:'text'},{id:'f4',label:'내용',type:'textarea'}]},
  {id:'dt2',name:'휴가신청서',fields:[{id:'f5',label:'휴가종류',type:'select',options:'연차,반차(오전),반차(오후),병가,경조사,기타'},{id:'f6',label:'시작일',type:'date'},{id:'f7',label:'종료일',type:'date'},{id:'f8',label:'사유',type:'textarea'}],isVacation:true,vacStartField:'f6',vacEndField:'f7',vacTypeField:'f5'},
  {id:'dt3',name:'지출결의서',fields:[{id:'f9',label:'금액(원)',type:'number'},{id:'f10',label:'지출목적',type:'text'},{id:'f11',label:'내용',type:'textarea'}]},

// Helpers
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fD(iso){if(!iso)return '';const d=new Date(iso);return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;}
function fDT(iso){if(!iso)return '';const d=new Date(iso);return fD(iso)+` ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}
function genDocNum(){const s=getSettings();s.docCounter=(s.docCounter||0)+1;setSettings(s);let f=s.docNumFormat||'DOC-{YYYY}-{NUM:4}';f=f.replace('{YYYY}',new Date().getFullYear());f=f.replace(/\{NUM:(\d+)\}/,(m,n)=>String(s.docCounter).padStart(+n,'0'));return f;}
function dSt(doc){if(doc.status==='rejected')return 'rejected';if(doc.status==='draft')return 'draft';if(doc.approvalLine.every(a=>a.status==='approved'))return 'approved';return 'pending';}
function dStL(doc){return{draft:'임시저장',pending:'진행중',approved:'완료',rejected:'반려'}[dSt(doc)];}
function prevOk(doc,uid){const i=doc.approvalLine.findIndex(a=>a.userId===uid);if(i<=0)return true;return doc.approvalLine[i-1].status==='approved';}

// --- Dashboard ---
function renderDashboard(){
  const docs2=getDocs(),u=S.user;
  const pending=docs2.filter(d=>{const l=d.approvalLine.find(a=>a.userId===u.id);return l&&l.status==='pending'&&dSt(d)==='pending'&&prevOk(d,u.id);});
  const myDocs=docs2.filter(d=>d.authorId===u.id);
  const approved=docs2.filter(d=>dSt(d)==='approved');
  const rejected=docs2.filter(d=>dSt(d)==='rejected');
  const inv=getInventory();
  const lowStock=inv.filter(i=>i.qty<=i.minQty);
  const recentDocs=docs2.slice(0,5);
  const todayEvents=getEvents().filter(e=>{const t=new Date().toISOString().slice(0,10);return t>=e.start&&t<=e.end;});
  // Vacation today
  const vacToday=[];
  docs2.forEach(d=>{if(dSt(d)!=='approved')return;const dt=getDocTypes().find(t=>t.id===d.docTypeId);if(!dt||!dt.isVacation)return;const vs=d.fieldValues&&d.fieldValues[dt.vacStartField];const ve=d.fieldValues&&d.fieldValues[dt.vacEndField];if(!vs||!ve)return;const t=new Date().toISOString().slice(0,10);if(t>=vs&&t<=ve){const au=getUser(d.authorId);vacToday.push({name:au?au.name:'?',type:d.fieldValues[dt.vacTypeField]||'휴가',end:ve});}});

  return `<div>
    <div class="dash-grid">
      <div class="dash-card"><div class="dc-icon" style="background:var(--primary-light);color:var(--primary);">&#128203;</div><div class="dc-val">${pending.length}</div><div class="dc-label">결재 대기</div></div>
      <div class="dash-card"><div class="dc-icon" style="background:var(--success-light);color:var(--success);">&#9989;</div><div class="dc-val">${approved.length}</div><div class="dc-label">결재 완료</div></div>
      <div class="dash-card"><div class="dc-icon" style="background:var(--danger-light);color:var(--danger);">&#10060;</div><div class="dc-val">${rejected.length}</div><div class="dc-label">반려</div></div>
      <div class="dash-card"><div class="dc-icon" style="background:var(--warning-light);color:var(--warning);">&#128230;</div><div class="dc-val">${inv.length}</div><div class="dc-label">재고 품목${lowStock.length?` <span style="color:var(--danger);">(부족 ${lowStock.length})</span>`:''}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:2fr 1fr;gap:16px;">
      <div>
        <div class="dash-recent"><div class="dr-header">최근 문서 <a style="font-size:12px;color:var(--primary);font-weight:400;cursor:pointer;" onclick="go('mydrafts')">전체보기 &#8594;</a></div>
          ${recentDocs.length?recentDocs.map(d=>{const au=getUser(d.authorId);const dt=getDocTypes().find(t=>t.id===d.docTypeId);
            return `<div class="dr-item" onclick="S.docId='${d.id}';go('view');"><span class="badge-s ${dSt(d)}">${dStL(d)}</span><div class="dr-info"><div class="t">${esc(d.title)}</div><div class="d">${esc(dt?dt.name:'')} · ${esc(au?au.name:'')} · ${fD(d.createdAt)}</div></div></div>`;}).join(''):`<div style="padding:40px;text-align:center;color:var(--gray-400);">문서가 없습니다</div>`}
        </div>
      </div>
      <div>
        ${vacToday.length?`<div class="dash-recent" style="margin-bottom:16px;"><div class="dr-header">&#127796; 오늘 휴가</div>
          ${vacToday.map(v=>`<div class="dr-item"><div class="dr-info"><div class="t">${esc(v.name)}</div><div class="d">${esc(v.type)} · ~${v.end}</div></div></div>`).join('')}</div>`:''}
        <div class="dash-recent"><div class="dr-header">&#128197; 오늘 일정</div>
          ${todayEvents.length?todayEvents.map(e=>`<div class="dr-item" onclick="S.editId='${e.id}';S.modal='eventView';R();"><div class="dr-info"><div class="t">${esc(e.title)}</div><div class="d">${e.start}${e.end!==e.start?' ~ '+e.end:''}</div></div></div>`).join(''):`<div style="padding:30px;text-align:center;color:var(--gray-400);font-size:12px;">일정 없음</div>`}
        </div>
      </div>
    </div>
  </div>`;
}

// --- Doc List ---
function getFiltered(){
  const docs2=getDocs(),u=S.user;
  switch(S.view){
    case 'pending':return docs2.filter(d=>{if(d.status==='draft')return false;const l=d.approvalLine.find(a=>a.userId===u.id);return l&&l.status==='pending'&&dSt(d)==='pending'&&prevOk(d,u.id);});
    case 'received':return docs2.filter(d=>{if(d.status==='draft')return false;return d.approvalLine.some(a=>a.userId===u.id)&&d.authorId!==u.id;});
    case 'scheduled':return docs2.filter(d=>{if(d.status==='draft')return false;const l=d.approvalLine.find(a=>a.userId===u.id);return l&&l.status==='pending'&&!prevOk(d,u.id);});
    case 'mydrafts':return docs2.filter(d=>d.authorId===u.id);
    case 'drafts':return docs2.filter(d=>d.authorId===u.id&&d.status==='draft');
    case 'myapproved':return docs2.filter(d=>{const l=d.approvalLine.find(a=>a.userId===u.id);return l&&(l.status==='approved'||l.status==='rejected');});
    case 'deptall':return docs2.filter(d=>{const a=getUser(d.authorId);return a&&a.dept===u.dept&&d.status!=='draft';});
    default:return docs2;
  }
}
function renderDocList(){
  const f=getFiltered();
  if(!f.length)return `<div class="empty"><p>문서가 없습니다.</p></div>`;
  return `<div class="card"><table class="tbl"><thead><tr><th>상태</th><th>종류</th><th>문서번호</th><th>제목</th><th>기안자</th><th>기안일</th><th>결재</th></tr></thead><tbody>
    ${f.map(d=>{const au=getUser(d.authorId);const dt=getDocTypes().find(t=>t.id===d.docTypeId);const ap=d.approvalLine.filter(x=>x.status==='approved').length;
    return `<tr><td><span class="badge-s ${dSt(d)}">${dStL(d)}</span></td><td>${esc(dt?dt.name:'')}</td><td style="font-size:12px;">${d.docNumber||'-'}</td><td><span class="link" onclick="S.docId='${d.id}';go('view');">${esc(d.title)}</span></td><td>${esc(au?au.name:'')}</td><td style="font-size:12px;">${fD(d.createdAt)}</td><td>${ap}/${d.approvalLine.length}</td></tr>`;}).join('')}
  </tbody></table></div>`;
}

// --- Doc View ---
function renderDocView(){
  const docs2=getDocs();const doc=docs2.find(d=>d.id===S.docId);if(!doc)return `<div class="empty"><p>문서를 찾을 수 없습니다.</p></div>`;
  const author=getUser(doc.authorId);const st=dSt(doc);
  const isMyTurn=doc.approvalLine.some(a=>a.userId===S.user.id&&a.status==='pending'&&prevOk(doc,S.user.id))&&st==='pending';
  const isAuthor=doc.authorId===S.user.id;
  const dt=getDocTypes().find(t=>t.id===doc.docTypeId);const dtName=dt?dt.name:'문서';

  let detailHtml='';
  if(dt&&dt.fields){dt.fields.forEach(f=>{const v=doc.fieldValues&&doc.fieldValues[f.id];if(v!==undefined&&v!==''){
    let display=v;if(f.type==='number')display=Number(v).toLocaleString();if(f.type==='checkbox')display=v?'Y':'N';
    if(f.type!=='textarea')detailHtml+=`<tr><th>${esc(f.label)}</th><td>${esc(display)}</td></tr>`;
  }});}

  let bodyContent='';
  if(dt&&dt.fields){dt.fields.forEach(f=>{if(f.type==='textarea'){const v=doc.fieldValues&&doc.fieldValues[f.id];if(v)bodyContent+=v;}});}

  return `<div class="doc-container"><div class="doc-main card">
    <div class="doc-toolbar">
      ${isMyTurn?`<button class="btn btn-success" onclick="approveDoc('${doc.id}')">&#10003; 승인</button><button class="btn btn-danger" onclick="S.modal='reject';R();">반려</button>`:''}
      ${isAuthor&&st==='draft'?`<button class="btn btn-primary" onclick="resubmitDoc('${doc.id}')">결재 상신</button>`:''}
      ${isAuthor&&st==='pending'?`<button class="btn btn-danger" onclick="cancelDoc('${doc.id}')">회수</button>`:''}
      <button class="btn" onclick="go('pending')">&#8592; 목록</button>
    </div>
    <div class="doc-paper">
      <h1>${dtName.split('').join(' ')}</h1>
      <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;margin-bottom:20px;">
        <table class="meta-tbl"><tr><th>기안자</th><td>${esc(author?author.name:'')}</td></tr><tr><th>소속</th><td>${esc(author?author.dept:'')}</td></tr><tr><th>기안일</th><td>${fDT(doc.createdAt)}</td></tr><tr><th>문서번호</th><td>${doc.docNumber||'<span style="color:var(--gray-400)">미부여</span>'}</td></tr></table>
        <table class="approval-tbl"><tr><th rowspan="2" style="writing-mode:vertical-lr;padding:8px 4px;">결<br>재</th>
          ${doc.approvalLine.map(a=>{const u2=getUser(a.userId);return `<th>${esc(u2?u2.role:'')}</th>`;}).join('')}</tr><tr>
          ${doc.approvalLine.map(a=>{const u2=getUser(a.userId);
            if(a.status==='approved'){const sig=u2&&u2.signature;return `<td class="stamp-cell"><div class="stamp"><div class="stamp-circle">${sig?'<img src="'+sig+'">':'승인'}</div><div class="stamp-name">${esc(u2?u2.name:'')}</div><div class="stamp-date">${fD(a.actionAt)}</div></div></td>`;}
            if(a.status==='rejected')return `<td class="stamp-cell"><div class="stamp"><div class="stamp-circle rej">반려</div><div class="stamp-name">${esc(u2?u2.name:'')}</div><div class="stamp-date">${fD(a.actionAt)}</div></div></td>`;
            return `<td class="stamp-cell"><span style="color:var(--gray-300);font-size:11px;">${esc(u2?u2.name:'')}</span></td>`;
          }).join('')}</tr></table>
      </div>
      <table class="detail-tbl"><tr><th>제목</th><td colspan="3">${esc(doc.title)}</td></tr>${detailHtml}</table>
      ${bodyContent?`<p class="doc-body-label">- 아 래 -</p><div class="doc-body">${esc(bodyContent)}</div>`:''}
    </div>
  </div>
  <div class="doc-sidebar"><div class="card"><div class="card-header"><h4>결재선</h4></div>
    ${doc.approvalLine.map(a=>{const u2=getUser(a.userId);const cur=a.status==='pending'&&prevOk(doc,a.userId)&&st==='pending';
      let sl='',sc='';if(a.status==='approved'){sl='승인';sc='done';}else if(a.status==='rejected'){sl='반려';sc='rej';}else if(cur){sl='대기';sc='wait';}else{sl='예정';sc='';}
      return `<div class="al-item ${cur?'current':''}"><div class="avatar sm" style="background:${u2?u2.color:'#999'}">${u2?u2.name[0]:'?'}</div>
        <div class="al-info"><div class="n">${esc(u2?u2.name:'')} ${esc(u2?u2.role:'')}</div><div class="d">${esc(u2?u2.dept:'')}</div>
        ${a.actionAt?`<div class="d">${fDT(a.actionAt)}</div>`:''}${a.comment?`<div class="d" style="color:var(--danger);">사유: ${esc(a.comment)}</div>`:''}</div>
        ${sl?`<span class="al-status ${sc}">${sl}</span>`:''}</div>`;
    }).join('')}
  </div></div></div>`;
}

// --- Calendar ---
function renderCalendar(){
  const y=S.calY,m=S.calM;const first=new Date(y,m,1);const last=new Date(y,m+1,0);const sd=first.getDay();const td=last.getDate();
  const todayStr=new Date().toISOString().slice(0,10);
  const vacEvs=[];getDocs().forEach(d=>{if(dSt(d)!=='approved')return;const dt=getDocTypes().find(t=>t.id===d.docTypeId);if(!dt||!dt.isVacation)return;const vs=d.fieldValues&&d.fieldValues[dt.vacStartField];const ve=d.fieldValues&&d.fieldValues[dt.vacEndField];const vt=d.fieldValues&&d.fieldValues[dt.vacTypeField];if(!vs||!ve)return;const au=getUser(d.authorId);vacEvs.push({title:`${au?au.name:'?'} ${vt||'휴가'}`,start:vs,end:ve});});
  const calEvs=getEvents();
  let cells='';const pl=new Date(y,m,0).getDate();
  for(let i=sd-1;i>=0;i--)cells+=`<div class="cal-c other"><div class="dn">${pl-i}</div></div>`;
  for(let d=1;d<=td;d++){const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;let ev='';
    vacEvs.forEach(e=>{if(ds>=e.start&&ds<=e.end)ev+=`<div class="cal-ev vac">${esc(e.title)}</div>`;});
    calEvs.forEach(e=>{if(ds>=e.start&&ds<=e.end)ev+=`<div class="cal-ev evt" onclick="event.stopPropagation();S.editId='${e.id}';S.modal='eventView';R();">${esc(e.title)}</div>`;});
    cells+=`<div class="cal-c ${ds===todayStr?'today':''}" onclick="openEvModal('${ds}')"><div class="dn">${d}</div>${ev}</div>`;}
  const rem=7-((sd+td)%7);if(rem<7)for(let i=1;i<=rem;i++)cells+=`<div class="cal-c other"><div class="dn">${i}</div></div>`;
  const mn=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  return `<div style="max-width:1000px;margin:0 auto;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div style="display:flex;align-items:center;gap:12px;"><button class="btn btn-sm" onclick="calNav(-1)">&#9664;</button><span style="font-size:16px;font-weight:700;min-width:140px;text-align:center;">${y}년 ${mn[m]}</span><button class="btn btn-sm" onclick="calNav(1)">&#9654;</button>
        <button class="btn btn-sm" onclick="S.calY=new Date().getFullYear();S.calM=new Date().getMonth();R();">오늘</button></div>
      <div style="font-size:11px;display:flex;gap:10px;"><span class="cal-ev vac" style="display:inline-block;">휴가</span><span class="cal-ev evt" style="display:inline-block;">행사</span></div>
    </div>
    <div class="cal-grid"><div class="cal-dh">일</div><div class="cal-dh">월</div><div class="cal-dh">화</div><div class="cal-dh">수</div><div class="cal-dh">목</div><div class="cal-dh">금</div><div class="cal-dh">토</div>${cells}</div></div>`;
}

// --- Modal ---
function renderModal(){
  if(S.modal==='reject')return `<div class="modal-overlay" onclick="S.modal=null;R();"><div class="modal" onclick="event.stopPropagation()"><h3>반려 사유</h3><div class="fg"><textarea id="rej-r" placeholder="사유 입력"></textarea></div><div class="modal-actions"><button class="btn" onclick="S.modal=null;R();">취소</button><button class="btn btn-danger" onclick="rejectDoc('${S.docId}')">반려</button></div></div></div>`;
  if(S.modal==='event'||S.modal==='eventView'){const ev=S.editId?getEvents().find(e=>e.id===S.editId):null;
    if(S.modal==='eventView'&&ev)return `<div class="modal-overlay" onclick="S.modal=null;S.editId=null;R();"><div class="modal" onclick="event.stopPropagation()"><h3>${esc(ev.title)}</h3><p style="font-size:13px;">&#128197; ${ev.start}${ev.end!==ev.start?' ~ '+ev.end:''}</p>${ev.people?`<p style="font-size:13px;margin-top:4px;">&#128101; ${esc(ev.people)}</p>`:''}${ev.desc?`<p style="font-size:13px;margin-top:8px;white-space:pre-wrap;">${esc(ev.desc)}</p>`:''}<div class="modal-actions"><button class="btn" onclick="S.modal='event';R();">수정</button><button class="btn btn-danger" onclick="delEvent('${ev.id}')">삭제</button><button class="btn btn-primary" onclick="S.modal=null;S.editId=null;R();">닫기</button></div></div></div>`;
    return `<div class="modal-overlay" onclick="S.modal=null;S.editId=null;R();"><div class="modal" onclick="event.stopPropagation()"><h3>${ev?'일정 수정':'새 일정'}</h3>
      <div class="fg"><label>제목</label><input id="ev-t" value="${esc(ev?ev.title:'')}"></div>
      <div class="fr"><div class="fg"><label>시작</label><input type="date" id="ev-s" value="${ev?ev.start:(S.calDate||'')}"></div><div class="fg"><label>종료</label><input type="date" id="ev-e" value="${ev?ev.end:(S.calDate||'')}"></div></div>
      <div class="fg"><label>설명</label><textarea id="ev-d" style="min-height:60px;">${esc(ev?ev.desc:'')}</textarea></div>
      <div class="fg"><label>참여자</label><input id="ev-p" value="${esc(ev?ev.people:'')}" placeholder="쉼표 구분"></div>
      <div class="modal-actions">${ev?`<button class="btn btn-danger" onclick="delEvent('${ev.id}')" style="margin-right:auto;">삭제</button>`:''}<button class="btn" onclick="S.modal=null;S.editId=null;R();">취소</button><button class="btn btn-primary" onclick="saveEvent()">${ev?'수정':'등록'}</button></div></div></div>`;}
  if(S.modal==='editUser'){const u=getUser(S.editId);if(!u){S.modal=null;return '';}
    return `<div class="modal-overlay" onclick="S.modal=null;R();"><div class="modal" onclick="event.stopPropagation()"><h3>사용자 수정</h3>
      <div class="fg"><label>이름</label><input id="eu-n" value="${esc(u.name)}"></div>
      <div class="fg"><label>직급</label><select id="eu-r">${['사원','대리','과장','부장','부사장','대표이사'].map(r=>`<option ${r===u.role?'selected':''}>${r}</option>`).join('')}</select></div>
      <div class="fg"><label>부서</label><input id="eu-d" value="${esc(u.dept)}"></div>
      <div class="fg"><label>비밀번호</label><input type="password" id="eu-pw" placeholder="미입력시 유지"></div>
      <div class="modal-actions"><button class="btn" onclick="S.modal=null;R();">취소</button><button class="btn btn-primary" onclick="saveEditUser('${u.id}')">저장</button></div></div></div>`;}
  if(S.modal==='editDt'){const dt=S.editId?getDocTypes().find(t=>t.id===S.editId):null;
    return `<div class="modal-overlay" onclick="S.modal=null;R();"><div class="modal" onclick="event.stopPropagation()"><h3>${dt?'양식 수정':'새 양식'}</h3>
      <div class="fg"><label>이름</label><input id="edt-n" value="${esc(dt?dt.name:'')}"></div>
      <div class="fg"><label style="display:flex;align-items:center;gap:6px;font-weight:normal;"><input type="checkbox" id="edt-v" ${dt&&dt.isVacation?'checked':''}> 휴가 문서</label></div>
      ${dt&&dt.isVacation?`<div style="background:var(--warning-light);padding:10px;border-radius:6px;margin-bottom:14px;font-size:12px;">
        <div class="fg"><label>시작일 필드ID</label><input id="edt-vs" value="${esc(dt.vacStartField||'')}" style="font-size:12px;padding:4px 8px;"></div>
        <div class="fg"><label>종료일 필드ID</label><input id="edt-ve" value="${esc(dt.vacEndField||'')}" style="font-size:12px;padding:4px 8px;"></div>
        <div class="fg" style="margin-bottom:0;"><label>휴가종류 필드ID</label><input id="edt-vt" value="${esc(dt.vacTypeField||'')}" style="font-size:12px;padding:4px 8px;"></div></div>`:''}
      <div class="modal-actions"><button class="btn" onclick="S.modal=null;R();">취소</button><button class="btn btn-primary" onclick="saveDt()">저장</button></div></div></div>`;}
  if(S.modal==='editFbField'){
    const dt=getDocTypes().find(t=>t.id===S.fbDtId);const f=dt?dt.fields.find(x=>x.id===S.fbFid):null;
    return `<div class="modal-overlay" onclick="S.modal=null;R();"><div class="modal" onclick="event.stopPropagation()"><h3>필드 ${f?'수정':'추가'}</h3>
      <div class="fg"><label>라벨</label><input id="fbf-l" value="${esc(f?f.label:'')}"></div>
      <div class="fg"><label>타입</label><select id="fbf-t">${FIELD_TYPES.map(ft=>`<option value="${ft.type}" ${f&&f.type===ft.type?'selected':''}>${ft.label}</option>`).join('')}</select></div>
      <div class="fg"><label>옵션 (select용, 쉼표구분)</label><input id="fbf-o" value="${esc(f?(f.options||''):'')}" placeholder="옵션1,옵션2"></div>
      <div class="modal-actions"><button class="btn" onclick="S.modal=null;R();">취소</button><button class="btn btn-primary" onclick="saveFbField()">저장</button></div></div></div>`;}
  if(S.modal==='addInv'||S.modal==='editInv'){const inv=S.editId?getInventory().find(i=>i.id===S.editId):null;
    return `<div class="modal-overlay" onclick="S.modal=null;S.editId=null;R();"><div class="modal" onclick="event.stopPropagation()"><h3>${inv?'품목 수정':'품목 등록'}</h3>
      <div class="fr"><div class="fg"><label>품목코드</label><input id="iv-c" value="${esc(inv?inv.code:'')}"></div><div class="fg"><label>품명</label><input id="iv-n" value="${esc(inv?inv.name:'')}"></div></div>
      <div class="fr"><div class="fg"><label>카테고리</label><input id="iv-cat" value="${esc(inv?inv.category:'')}"></div><div class="fg"><label>보관위치</label><input id="iv-loc" value="${esc(inv?inv.location:'')}"></div></div>
      <div class="fr"><div class="fg"><label>수량</label><input type="number" id="iv-q" value="${inv?inv.qty:0}" min="0"></div><div class="fg"><label>최소수량</label><input type="number" id="iv-mq" value="${inv?inv.minQty:0}" min="0"></div></div>
      <div class="modal-actions"><button class="btn" onclick="S.modal=null;S.editId=null;R();">취소</button><button class="btn btn-primary" onclick="saveInv()">저장</button></div></div></div>`;}
  if(S.modal==='inout'){const inv=getInventory().find(i=>i.id===S.editId);if(!inv)return '';
    return `<div class="modal-overlay" onclick="S.modal=null;S.editId=null;R();"><div class="modal" onclick="event.stopPropagation()"><h3>입출고: ${esc(inv.name)}</h3>
      <p style="font-size:13px;margin-bottom:16px;">현재 수량: <b>${inv.qty}</b></p>
      <div class="fr"><div class="fg"><label>유형</label><select id="io-t"><option value="in">입고</option><option value="out">출고</option></select></div><div class="fg"><label>수량</label><input type="number" id="io-a" value="1" min="1"></div></div>
      <div class="fg"><label>비고</label><input id="io-n" placeholder="비고"></div>
      <div class="modal-actions"><button class="btn" onclick="S.modal=null;S.editId=null;R();">취소</button><button class="btn btn-primary" onclick="doInOut()">처리</button></div></div></div>`;}
  return '';
}

// =============== ACTIONS ===============
function go(v){S.view=v;R();}
function doLogin(){const u=getUser(S.loginUid);const pw=document.getElementById('pw-in').value;if(pw!==u.pw){document.getElementById('login-err').textContent='비밀번호가 올바르지 않습니다.';return;}S.user=u;setCurUser(u);S.view='dashboard';S.loginMode='select';R();}
function doRegister(){const n=document.getElementById('rg-n').value.trim(),r=document.getElementById('rg-r').value,d=document.getElementById('rg-d').value.trim(),p=document.getElementById('rg-p').value,p2=document.getElementById('rg-p2').value,err=document.getElementById('rg-err');
  if(!n){err.textContent='이름 입력';return;}if(!d){err.textContent='부서 입력';return;}if(!p){err.textContent='비밀번호 입력';return;}if(p!==p2){err.textContent='비밀번호 불일치';return;}
  const users=getUsers();const nu={id:'u'+Date.now(),name:n,role:r,dept:d,color:COLORS[users.length%COLORS.length],pw:p,signature:null};users.push(nu);setUsers(users);S.user=nu;setCurUser(nu);S.view='dashboard';S.loginMode='select';R();}
function logout(){S.user=null;sessionStorage.removeItem('ea3_user');S.loginMode='select';R();}

// Doc actions
function onDtChange(){const sel=document.getElementById('d-type').value;const dt=getDocTypes().find(t=>t.id===sel);document.getElementById('dyn-fields').innerHTML=renderDynFields(sel);document.getElementById('d-type-title').textContent=dt?dt.name.split('').join(' '):'';}
function getApprovers(){const r=[];document.querySelectorAll('.ap-sel').forEach(s=>{if(s.value)r.push(s.value);});return r;}
function collectFields(){const dtId=document.getElementById('d-type').value;const dt=getDocTypes().find(t=>t.id===dtId);const vals={};if(dt)dt.fields.forEach(f=>{const el=document.getElementById('df-'+f.id);if(el)vals[f.id]=f.type==='checkbox'?el.checked:el.value;});return{docTypeId:dtId,title:document.getElementById('d-title').value.trim(),fieldValues:vals};}
function submitDoc(){const data=collectFields();if(!data.title){alert('제목을 입력하세요.');return;}const ap=getApprovers();if(!ap.length){alert('결재자를 선택하세요.');return;}
  const doc={id:'doc_'+Date.now(),...data,authorId:S.user.id,status:'submitted',docNumber:null,createdAt:new Date().toISOString(),approvalLine:ap.map(uid=>({userId:uid,status:'pending',actionAt:null,comment:''}))};
  const docs2=getDocs();docs2.unshift(doc);setDocs(docs2);go('mydrafts');}
function saveDraft(){const data=collectFields();data.title=data.title||'(제목 없음)';const ap=getApprovers();
  const doc={id:'doc_'+Date.now(),...data,authorId:S.user.id,status:'draft',docNumber:null,createdAt:new Date().toISOString(),approvalLine:ap.map(uid=>({userId:uid,status:'pending',actionAt:null,comment:''}))};
  const docs2=getDocs();docs2.unshift(doc);setDocs(docs2);go('drafts');}
function resubmitDoc(id){const docs2=getDocs();const d=docs2.find(x=>x.id===id);if(!d)return;d.status='submitted';d.approvalLine.forEach(a=>{a.status='pending';a.actionAt=null;a.comment='';});setDocs(docs2);R();}
function cancelDoc(id){if(!confirm('회수하시겠습니까?'))return;const docs2=getDocs();const d=docs2.find(x=>x.id===id);if(!d)return;d.status='draft';d.approvalLine.forEach(a=>{a.status='pending';a.actionAt=null;a.comment='';});setDocs(docs2);R();}
function approveDoc(id){const docs2=getDocs();const d=docs2.find(x=>x.id===id);if(!d)return;const l=d.approvalLine.find(a=>a.userId===S.user.id&&a.status==='pending');if(!l)return;l.status='approved';l.actionAt=new Date().toISOString();if(d.approvalLine.every(a=>a.status==='approved')){d.status='approved';d.docNumber=genDocNum();}setDocs(docs2);R();}
function rejectDoc(id){const docs2=getDocs();const d=docs2.find(x=>x.id===id);if(!d)return;const l=d.approvalLine.find(a=>a.userId===S.user.id&&a.status==='pending');if(!l)return;l.status='rejected';l.actionAt=new Date().toISOString();l.comment=document.getElementById('rej-r').value.trim();d.status='rejected';setDocs(docs2);S.modal=null;R();}
function addSlot(){const c=document.getElementById('ap-slots');const users=getUsers().filter(u=>u.id!==S.user.id);const i=c.children.length;const div=document.createElement('div');div.className='ap-slot';div.innerHTML=`<span class="sl">${i+1}차</span><select class="ap-sel"><option value="">선택</option>${users.map(u=>`<option value="${u.id}">${esc(u.name)} ${esc(u.role)}</option>`).join('')}</select><button class="rm-b" onclick="rmSlot(this)">&#10005;</button>`;c.appendChild(div);}
function rmSlot(btn){const c=document.getElementById('ap-slots');if(c.children.length<=1){alert('최소 1명');return;}btn.parentElement.remove();Array.from(c.children).forEach((el,i)=>{el.querySelector('.sl').textContent=`${i+1}차`;});}

// Settings
function saveProfile(){const users=getUsers();const u=users.find(x=>x.id===S.user.id);if(!u)return;u.name=document.getElementById('sp-n').value.trim()||u.name;u.role=document.getElementById('sp-r').value;u.dept=document.getElementById('sp-d').value.trim()||u.dept;const pw=document.getElementById('sp-pw').value;if(pw)u.pw=pw;setUsers(users);S.user=u;setCurUser(u);alert('저장됨');R();}
function updColor(c){const users=getUsers();const u=users.find(x=>x.id===S.user.id);if(!u)return;u.color=c;setUsers(users);S.user=u;setCurUser(u);R();}
function uploadSignature(input){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(e){const users=getUsers();const u=users.find(x=>x.id===S.user.id);if(!u)return;u.signature=e.target.result;setUsers(users);S.user=u;setCurUser(u);R();};reader.readAsDataURL(file);}
function removeSignature(){const users=getUsers();const u=users.find(x=>x.id===S.user.id);if(!u)return;u.signature=null;setUsers(users);S.user=u;setCurUser(u);R();}
function editUser(id){S.editId=id;S.modal='editUser';R();}
function saveEditUser(id){const users=getUsers();const u=users.find(x=>x.id===id);if(!u)return;u.name=document.getElementById('eu-n').value.trim()||u.name;u.role=document.getElementById('eu-r').value;u.dept=document.getElementById('eu-d').value.trim()||u.dept;const pw=document.getElementById('eu-pw').value;if(pw)u.pw=pw;setUsers(users);if(id===S.user.id){S.user=u;setCurUser(u);}S.modal=null;R();}
function delUser(id){if(!confirm('삭제?'))return;setUsers(getUsers().filter(u=>u.id!==id));R();}
function editDt(id){S.editId=id;S.modal='editDt';R();}
function saveDt(){const n=document.getElementById('edt-n').value.trim();if(!n){alert('이름 입력');return;}const v=document.getElementById('edt-v').checked;const types=getDocTypes();
  if(S.editId){const t=types.find(x=>x.id===S.editId);if(t){t.name=n;t.isVacation=v;if(v){const vs=document.getElementById('edt-vs');const ve=document.getElementById('edt-ve');const vt=document.getElementById('edt-vt');if(vs)t.vacStartField=vs.value;if(ve)t.vacEndField=ve.value;if(vt)t.vacTypeField=vt.value;}}}
  else{types.push({id:'dt_'+Date.now(),name:n,fields:[{id:'f_'+Date.now(),label:'내용',type:'textarea'}],isVacation:v});}
  setDocTypes(types);S.modal=null;R();}
function delDt(id){if(!confirm('삭제?'))return;setDocTypes(getDocTypes().filter(t=>t.id!==id));R();}
function saveDocNum(){const s=getSettings();s.docNumFormat=document.getElementById('sn-f').value.trim()||'DOC-{YYYY}-{NUM:4}';s.docCounter=parseInt(document.getElementById('sn-c').value)||0;setSettings(s);alert('저장됨');R();}
function saveCompany(){const s=getSettings();s.companyName=document.getElementById('sc-n').value.trim()||'회사';setSettings(s);alert('저장됨');R();}
function uploadLogo(input){const file=input.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(e){const s=getSettings();s.logo=e.target.result;setSettings(s);R();};reader.readAsDataURL(file);}
function removeLogo(){const s=getSettings();s.logo=null;setSettings(s);R();}

// Calendar
function calNav(dir){S.calM+=dir;if(S.calM<0){S.calM=11;S.calY--;}if(S.calM>11){S.calM=0;S.calY++;}R();}
function openEvModal(d){S.calDate=d;S.editId=null;S.modal='event';R();}
function saveEvent(){const t=document.getElementById('ev-t').value.trim();if(!t){alert('제목 입력');return;}const s=document.getElementById('ev-s').value,e=document.getElementById('ev-e').value||s;if(!s){alert('날짜 입력');return;}const events=getEvents();
  if(S.editId){const ev=events.find(x=>x.id===S.editId);if(ev){ev.title=t;ev.start=s;ev.end=e;ev.desc=document.getElementById('ev-d').value;ev.people=document.getElementById('ev-p').value;}}
  else{events.push({id:'ev_'+Date.now(),title:t,start:s,end:e,desc:document.getElementById('ev-d').value,people:document.getElementById('ev-p').value,createdBy:S.user.id});}
  setEvents(events);S.modal=null;S.editId=null;R();}
function delEvent(id){if(!confirm('삭제?'))return;setEvents(getEvents().filter(e=>e.id!==id));S.modal=null;S.editId=null;R();}

// Inventory
function saveInv(){const c=document.getElementById('iv-c').value.trim(),n=document.getElementById('iv-n').value.trim(),cat=document.getElementById('iv-cat').value.trim(),loc=document.getElementById('iv-loc').value.trim(),q=parseInt(document.getElementById('iv-q').value)||0,mq=parseInt(document.getElementById('iv-mq').value)||0;
  if(!n){alert('품명 입력');return;}const inv=getInventory();
  if(S.editId&&S.modal==='editInv'){const item=inv.find(i=>i.id===S.editId);if(item){item.code=c;item.name=n;item.category=cat;item.location=loc;item.qty=q;item.minQty=mq;}}
  else{inv.push({id:'iv_'+Date.now(),code:c||('ITM-'+String(inv.length+1).padStart(3,'0')),name:n,category:cat,location:loc,qty:q,minQty:mq});}
  setInventory(inv);S.modal=null;S.editId=null;R();}
function editInv(id){S.editId=id;S.modal='editInv';R();}
function delInv(id){if(!confirm('삭제?'))return;setInventory(getInventory().filter(i=>i.id!==id));R();}
function doInOut(){const type=document.getElementById('io-t').value;const amt=parseInt(document.getElementById('io-a').value)||0;const note=document.getElementById('io-n').value.trim();if(amt<=0){alert('수량 입력');return;}
  const inv=getInventory();const item=inv.find(i=>i.id===S.editId);if(!item)return;
  if(type==='out'&&item.qty<amt){alert('재고 부족');return;}
  item.qty+=type==='in'?amt:-amt;setInventory(inv);
  const logs=getInvLogs();logs.unshift({id:'lg_'+Date.now(),itemId:item.id,itemName:item.name,type,amount:amt,note,date:new Date().toISOString(),userId:S.user.id,userName:S.user.name});setInvLogs(logs);
  S.modal=null;S.editId=null;R();}

// Form Builder
function fbDrop(ev){ev.preventDefault();ev.target.closest('.fb-canvas')?.classList.remove('drag-over');
  const sel=document.getElementById('fb-dt');const dtId=sel?sel.value:'';const types=getDocTypes();const dt=types.find(t=>t.id===dtId);if(!dt)return;
  const nf={id:'f_'+Date.now(),label:'새 필드',type:S.fbDragType||'text',options:''};dt.fields.push(nf);setDocTypes(types);
  S.fbDtId=dtId;S.fbFid=nf.id;S.modal='editFbField';R();}
function editFbField(dtId,fid){S.fbDtId=dtId;S.fbFid=fid;S.modal='editFbField';R();}
function rmFbField(dtId,fid){if(!confirm('삭제?'))return;const types=getDocTypes();const dt=types.find(t=>t.id===dtId);if(!dt)return;dt.fields=dt.fields.filter(f=>f.id!==fid);setDocTypes(types);R();}
function saveFbField(){const l=document.getElementById('fbf-l').value.trim();if(!l){alert('라벨 입력');return;}const t=document.getElementById('fbf-t').value;const o=document.getElementById('fbf-o').value;
  const types=getDocTypes();const dt=types.find(x=>x.id===S.fbDtId);if(!dt)return;const f=dt.fields.find(x=>x.id===S.fbFid);if(f){f.label=l;f.type=t;f.options=o;}setDocTypes(types);S.modal=null;R();}

// =============== INIT ===============
function initSample(){
  if(localStorage.getItem('ea3_init'))return;
